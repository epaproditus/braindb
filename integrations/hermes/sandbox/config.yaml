# Hermes Agent config for the BrainDB sandbox (TEMPLATE — throwaway profile).
# Copied to ./hermes-data/config.yaml at deploy; edit THAT copy (gitignored) with
# your real model id + deepinfra key. Nothing secret is committed here.
#
# Brain  : deepinfra via a custom OpenAI-compatible endpoint.
# Memory : the braindb provider (its braindb_ask / braindb_ingest tools).
# Safety : every dangerous toolset is STRIPPED below, so the agent can only reach
#          BrainDB — it cannot run shell, code, the browser, or write files.

model:
  provider: custom
  base_url: https://api.deepinfra.com/v1/openai
  # Fill these in your gitignored ./hermes-data/config.yaml (NEVER commit them):
  default: ""    # a model id with >=64k context (Hermes refuses anything smaller)
  api_key: ""    # your deepinfra key (the custom provider reads model.api_key)

memory:
  provider: braindb

agent:
  # Strip everything that could touch the host or the open internet. The braindb
  # provider's tools are NOT part of these toolsets, so they stay available.
  disabled_toolsets:
    - terminal         # arbitrary shell on the host
    - code_execution   # arbitrary Python (toolset is 'code_execution', not 'execute_code')
    - browser          # web automation
    - computer_use     # desktop control
    - web              # web_search / web_extract (network egress)
    - file             # write_file / patch (filesystem writes)
