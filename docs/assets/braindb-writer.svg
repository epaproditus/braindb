<svg width="1140" height="382" viewBox="0 0 1140 382" xmlns="http://www.w3.org/2000/svg" aria-label="Wiki writer pipeline: lock and snapshot, gather context, draft with citations, reconcile relations, validate with retry, then commit a reversible living wiki page"><title>BrainDB - wiki writer pipeline</title><rect x="0" y="0" width="1140" height="382" rx="12" fill="#0E0F15"/>
        <defs>
          <marker id="ah7" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6F6D7A"/></marker>
          <marker id="ag7" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4DA3FF"/></marker>
        </defs>

        <!-- row 1 (left to right) -->
        <rect x="24" y="52" width="178" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="36" y="72" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">SUGGESTION</text>
        <text x="36" y="90" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">attach·create·consol</text>

        <rect x="238" y="52" width="196" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="250" y="72" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">LOCK + SNAPSHOT</text>
        <text x="250" y="90" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">prior revision saved</text>

        <rect x="470" y="52" width="202" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="482" y="72" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">GATHER</text>
        <text x="482" y="90" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">members + contradictions</text>

        <rect x="708" y="52" width="200" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="720" y="72" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">WRITER · LLM</text>
        <text x="720" y="90" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">skeleton + [[ref]] cites</text>

        <line x1="202" y1="78" x2="238" y2="78" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah7)"/>
        <line x1="434" y1="78" x2="470" y2="78" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah7)"/>
        <line x1="672" y1="78" x2="708" y2="78" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah7)"/>
        <line x1="808" y1="104" x2="808" y2="200" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah7)"/>

        <!-- row 2 (right to left) -->
        <rect x="708" y="202" width="200" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="720" y="222" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">RECONCILE</text>
        <text x="720" y="240" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">summarises · additive</text>

        <polygon points="620,192 666,228 620,264 574,228" fill="#13141C" stroke="#4DA3FF" stroke-width="1.3"/>
        <text x="620" y="231" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#4DA3FF" font-weight="700">validate</text>

        <rect x="388" y="202" width="150" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="400" y="222" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">COMMIT</text>
        <text x="400" y="240" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">new revision</text>

        <rect x="150" y="190" width="212" height="76" rx="8" fill="#13141C" stroke="#4DA3FF" stroke-width="1.6"/>
        <text x="162" y="212" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.1" fill="#4DA3FF" font-weight="700">LIVING WIKI PAGE</text>
        <text x="162" y="234" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">grounded · cited</text>
        <text x="162" y="252" font-family="Space Grotesk, sans-serif" font-size="11" fill="#B5B1A8">self-correcting</text>

        <line x1="708" y1="228" x2="666" y2="228" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah7)"/>
        <line x1="574" y1="228" x2="538" y2="228" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah7)"/>
        <text x="544" y="220" font-family="JetBrains Mono, monospace" font-size="8" fill="#6F6D7A">pass</text>
        <line x1="388" y1="228" x2="362" y2="228" stroke="#4DA3FF" stroke-width="1.5" marker-end="url(#ag7)"/>

        <!-- validate fail -> retry draft -->
        <path d="M 620 192 C 620 150 770 150 770 104" fill="none" stroke="#6F6D7A" stroke-width="1.3" stroke-dasharray="4 5" stroke-opacity="0.85" marker-end="url(#ah7)"/>
        <text x="636" y="150" font-family="JetBrains Mono, monospace" font-size="8" fill="#6F6D7A">fail · retry</text>

        <text x="156" y="292" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="0.4" fill="#6F6D7A">every change logged → auditable &amp; restorable</text>
