<svg width="1140" height="404" viewBox="0 0 1140 404" xmlns="http://www.w3.org/2000/svg" aria-label="Save and ingest: a direct API and agent lane plus a file-ingest watcher pipeline converge into the knowledge graph"><title>BrainDB — save and ingest pipeline</title><rect x="0" y="0" width="1140" height="404" rx="12" fill="#0E0F15"/>
        <defs>
          <marker id="ah4" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6F6D7A"/></marker>
          <marker id="ag4" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4DA3FF"/></marker>
        </defs>

        <!-- lane frames + labels -->
        <text x="58" y="24" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2.5" fill="#6F6D7A" font-weight="700">DIRECT / AGENT</text>
        <rect x="46" y="30" width="476" height="150" rx="10" fill="none" stroke="#262938" stroke-dasharray="3 6" stroke-opacity="0.7"/>
        <text x="58" y="222" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2.5" fill="#6F6D7A" font-weight="700">FILE INGEST</text>
        <rect x="46" y="228" width="884" height="92" rx="10" fill="none" stroke="#262938" stroke-dasharray="3 6" stroke-opacity="0.7"/>

        <!-- lane A: direct + agent -->
        <rect x="70" y="42" width="200" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="82" y="62" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">DIRECT API</text>
        <text x="82" y="80" font-family="Space Grotesk, sans-serif" font-size="12.5" fill="#E8E4DD">POST /entities/*</text>
        <rect x="70" y="104" width="200" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="82" y="124" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">AGENT</text>
        <text x="82" y="142" font-family="Space Grotesk, sans-serif" font-size="12.5" fill="#E8E4DD">/agent/query · NL</text>
        <rect x="336" y="73" width="168" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="348" y="93" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">STORE</text>
        <text x="348" y="111" font-family="Space Grotesk, sans-serif" font-size="12.5" fill="#E8E4DD">validate + persist</text>
        <line x1="270" y1="68" x2="332" y2="90" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah4)"/>
        <line x1="270" y1="130" x2="332" y2="108" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah4)"/>

        <!-- lane B: watcher pipeline -->
        <rect x="70" y="246" width="138" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="82" y="266" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">DROP</text>
        <text x="82" y="284" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">data/sources/</text>
        <rect x="244" y="246" width="158" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="256" y="266" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">WATCHER</text>
        <text x="256" y="284" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">poll 7s · dedup</text>
        <polygon points="476,236 516,272 476,308 436,272" fill="#13141C" stroke="#4DA3FF" stroke-width="1.3"/>
        <text x="476" y="276" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#4DA3FF" font-weight="700">new?</text>
        <rect x="438" y="176" width="80" height="30" rx="6" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="450" y="195" font-family="Space Grotesk, sans-serif" font-size="11" fill="#B5B1A8">skip · dup</text>
        <rect x="556" y="246" width="150" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="568" y="266" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">CHUNK</text>
        <text x="568" y="284" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">1200w · offsets</text>
        <rect x="742" y="246" width="172" height="52" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="754" y="266" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">EXTRACT</text>
        <text x="754" y="284" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">per chunk → facts</text>
        <line x1="208" y1="272" x2="430" y2="272" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah4)"/>
        <line x1="516" y1="272" x2="552" y2="272" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah4)"/>
        <text x="522" y="265" font-family="JetBrains Mono, monospace" font-size="8" fill="#6F6D7A">yes</text>
        <line x1="476" y1="236" x2="476" y2="208" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah4)"/>
        <text x="483" y="224" font-family="JetBrains Mono, monospace" font-size="8" fill="#6F6D7A">no</text>
        <line x1="706" y1="272" x2="738" y2="272" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah4)"/>

        <!-- converge into the graph -->
        <rect x="946" y="132" width="172" height="84" rx="8" fill="#13141C" stroke="#4DA3FF" stroke-width="1.6"/>
        <text x="960" y="156" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">KNOWLEDGE GRAPH</text>
        <text x="960" y="180" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">typed entities + relations</text>
        <text x="960" y="201" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#B5B1A8">keyword index · pgvector</text>
        <line x1="504" y1="99" x2="944" y2="150" stroke="#4DA3FF" stroke-width="1.5" marker-end="url(#ag4)"/>
        <line x1="914" y1="264" x2="944" y2="198" stroke="#4DA3FF" stroke-width="1.5" marker-end="url(#ag4)"/>
