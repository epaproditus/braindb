        <rect x="462" y="116" width="28" height="2" fill="#4DA3FF"/>
        <line x1="462" y1="128" x2="638" y2="128" stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
        <line x1="462" y1="138" x2="608" y2="138" stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
        <line x1="462" y1="148" x2="624" y2="148" stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
        <rect x="462" y="160" width="28" height="2" fill="#4DA3FF"/>
        <line x1="462" y1="172" x2="618" y2="172" stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
        <line x1="462" y1="182" x2="570" y2="182" stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>

        <!-- Fact 2 (bottom-left) -->
        <rect x="10" y="240" width="200" height="90" rx="6" fill="#13141C" stroke="#262938" stroke-width="1"/>
        <text x="22" y="260" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" fill="#4DA3FF" font-weight="700">FACT</text>
        <text x="22" y="283" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">Owner earnings reveal</text>
        <text x="22" y="301" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">real cash flow.</text>

        <!-- Derived thought (bottom-right, pill) -->
        <rect x="450" y="240" width="200" height="90" rx="18" fill="#13141C" stroke="#262938" stroke-width="1"/>
        <text x="462" y="260" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" fill="#4DA3FF" font-weight="700">&#8756; THOUGHT · DERIVED</text>
        <text x="462" y="283" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">A moated, cash-rich</text>
        <text x="462" y="301" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">company is a compounder.</text>

        <!-- Central keyword -->
        <circle cx="330" cy="170" r="40" fill="#0E0F15" stroke="#4DA3FF" stroke-width="2"/>
        <text x="330" y="160" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" fill="#4DA3FF" font-weight="700">KEYWORD</text>
        <text x="330" y="178" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD" font-weight="500">intrinsic</text>
        <text x="330" y="192" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD" font-weight="500">value</text>
