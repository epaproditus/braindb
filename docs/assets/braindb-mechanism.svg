<svg width="660" height="396" viewBox="0 0 660 396" xmlns="http://www.w3.org/2000/svg" aria-label="Four nodes — two facts, a wiki article, and a derived thought — connect symmetrically to the central keyword intrinsic value"><title>BrainDB — one keyword, one graph</title><rect x="0" y="0" width="660" height="396" rx="12" fill="#0E0F15"/>

        <!-- Embedding rings around the central keyword -->
        <circle cx="330" cy="170" r="68" fill="none" stroke="#4DA3FF" stroke-opacity="0.16" stroke-width="1" stroke-dasharray="3 5"/>
        <circle cx="330" cy="170" r="54" fill="none" stroke="#4DA3FF" stroke-opacity="0.26" stroke-width="1" stroke-dasharray="2 4"/>

        <!-- Four converging edges: corners -> keyword (X pattern) -->
        <line x1="210" y1="100" x2="295" y2="150" stroke="#B5B1A8" stroke-opacity="0.5" stroke-width="1.2"/>
        <line x1="450" y1="100" x2="365" y2="150" stroke="#B5B1A8" stroke-opacity="0.5" stroke-width="1.2"/>
        <line x1="210" y1="240" x2="295" y2="190" stroke="#B5B1A8" stroke-opacity="0.5" stroke-width="1.2"/>
        <line x1="450" y1="240" x2="365" y2="190" stroke="#B5B1A8" stroke-opacity="0.5" stroke-width="1.2"/>

        <!-- Fact 1 (top-left) -->
        <rect x="10" y="10" width="200" height="90" rx="6" fill="#13141C" stroke="#262938" stroke-width="1"/>
        <text x="22" y="30" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" fill="#4DA3FF" font-weight="700">FACT</text>
        <text x="22" y="53" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">A wide moat protects</text>
        <text x="22" y="71" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">long-term earnings.</text>

        <!-- Wiki (top-right, tall page) -->
        <rect x="450" y="10" width="200" height="180" rx="3" fill="#13141C" stroke="#262938" stroke-width="1"/>
        <rect x="450" y="10" width="200" height="3" fill="#4DA3FF"/>
        <text x="462" y="32" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" fill="#4DA3FF" font-weight="700">WIKI</text>
        <text x="462" y="52" font-family="Space Grotesk, sans-serif" font-size="13" fill="#E8E4DD" font-weight="700">Intrinsic Value</text>
        <line x1="462" y1="62" x2="638" y2="62" stroke="#262938" stroke-width="1"/>
        <line x1="462" y1="74"  x2="638" y2="74"  stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
        <line x1="462" y1="84"  x2="618" y2="84"  stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
        <line x1="462" y1="94"  x2="628" y2="94"  stroke="#6F6D7A" stroke-opacity="0.55" stroke-width="2"/>
