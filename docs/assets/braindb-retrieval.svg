<svg width="1140" height="376" viewBox="0 0 1140 376" xmlns="http://www.w3.org/2000/svg" aria-label="Retrieval: queries fan out to parallel fuzzy and semantic keyword matching, merge, graph-expand, rank, with always-on rules joining the ranked context"><title>BrainDB - retrieval pipeline</title><rect x="0" y="0" width="1140" height="376" rx="12" fill="#0E0F15"/>
        <defs>
          <marker id="ah5" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6F6D7A"/></marker>
          <marker id="ag5" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4DA3FF"/></marker>
        </defs>

        <!-- input -->
        <rect x="24" y="140" width="140" height="58" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="36" y="161" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">QUERIES</text>
        <text x="36" y="181" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">queries[] + depth</text>

        <!-- parallel match lanes -->
        <rect x="180" y="86" width="168" height="48" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="192" y="106" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">FUZZY MATCH</text>
        <text x="192" y="123" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">keywords · pg_trgm</text>
        <rect x="180" y="196" width="168" height="48" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="192" y="216" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">SEMANTIC MATCH</text>
        <text x="192" y="233" font-family="Space Grotesk, sans-serif" font-size="11.5" fill="#E8E4DD">keywords · pgvector</text>
        <text x="184" y="262" font-family="JetBrains Mono, monospace" font-size="8.5" letter-spacing="0.5" fill="#6F6D7A">per query · in parallel</text>
        <line x1="164" y1="158" x2="180" y2="112" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah5)"/>
        <line x1="164" y1="180" x2="180" y2="220" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah5)"/>

        <!-- merge -->
        <rect x="384" y="140" width="172" height="58" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="396" y="161" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">MERGE</text>
        <text x="396" y="181" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">geom-mean · penalty</text>
        <line x1="348" y1="110" x2="384" y2="160" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah5)"/>
        <line x1="348" y1="220" x2="384" y2="178" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah5)"/>

        <!-- expand -->
        <rect x="586" y="140" width="178" height="58" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="598" y="161" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">GRAPH EXPAND</text>
        <text x="598" y="181" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">≤3 hops · 1·0.8·0.6</text>
        <path d="M 706 140 C 706 116 626 116 626 140" fill="none" stroke="#6F6D7A" stroke-width="1.2" marker-end="url(#ah5)"/>
        <text x="640" y="112" font-family="JetBrains Mono, monospace" font-size="8" fill="#6F6D7A">hops</text>
        <line x1="556" y1="169" x2="586" y2="169" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah5)"/>

        <!-- rank -->
        <rect x="794" y="140" width="178" height="58" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="806" y="161" font-family="JetBrains Mono, monospace" font-size="9.5" letter-spacing="1.5" fill="#4DA3FF" font-weight="700">RANK</text>
        <text x="806" y="181" font-family="Space Grotesk, sans-serif" font-size="12" fill="#E8E4DD">decay × imp · L1/L2</text>
        <line x1="764" y1="169" x2="794" y2="169" stroke="#6F6D7A" stroke-width="1.4" marker-end="url(#ah5)"/>

        <!-- always-on rules -->
        <rect x="794" y="236" width="178" height="46" rx="7" fill="#13141C" stroke="#262938" stroke-width="1.2"/>
        <text x="806" y="255" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="1.3" fill="#4DA3FF" font-weight="700">ALWAYS-ON RULES</text>
        <text x="806" y="272" font-family="Space Grotesk, sans-serif" font-size="11" fill="#B5B1A8">injected every call</text>

        <!-- output -->
        <rect x="1002" y="124" width="138" height="92" rx="8" fill="#13141C" stroke="#4DA3FF" stroke-width="1.6"/>
        <text x="1014" y="146" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="1.1" fill="#4DA3FF" font-weight="700">RANKED CONTEXT</text>
        <text x="1014" y="170" font-family="Space Grotesk, sans-serif" font-size="11" fill="#E8E4DD">graph neighbourhood</text>
        <text x="1014" y="189" font-family="Space Grotesk, sans-serif" font-size="11" fill="#B5B1A8">ranked + capped</text>
        <line x1="972" y1="169" x2="1002" y2="160" stroke="#4DA3FF" stroke-width="1.5" marker-end="url(#ag5)"/>
        <line x1="924" y1="236" x2="1010" y2="198" stroke="#4DA3FF" stroke-width="1.5" marker-end="url(#ag5)"/>
